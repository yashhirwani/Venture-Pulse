<div class="analysis-container">
  <app-loader *ngIf="isSubmitting"></app-loader>

  <div class="form-card glass" *ngIf="!isSubmitting">
    <header class="form-header">
      <h1>New <span class="highlight">Intelligence Scan</span></h1>
      <p>Configure the parameters for the neural risk engine.</p>
    </header>

    <form (ngSubmit)="startNeuralScan()" #scanForm="ngForm">
      
      <div class="input-group">
        <label>Startup Concept (Idea Text)</label>
        <textarea 
          name="ideaText" 
          [(ngModel)]="analysisForm.ideaText" 
          placeholder="e.g. AI tool to predict startup failure..."
          rows="3"
          required
        ></textarea>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label>Industry / Domain</label>
          <input type="text" name="domain" [(ngModel)]="analysisForm.domain" placeholder="e.g. AI / SaaS" required>
        </div>
        <div class="input-group">
          <label>Target Users</label>
          <input type="text" name="targetUsers" [(ngModel)]="analysisForm.targetUsers" placeholder="e.g. Startup founders" required>
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label>Pricing Model</label>
          <input type="text" name="pricing" [(ngModel)]="analysisForm.pricingModel" placeholder="e.g. Subscription" required>
        </div>
        <div class="input-group">
          <label>Team Composition</label>
          <input type="text" name="team" [(ngModel)]="analysisForm.teamInfo" placeholder="e.g. 2 devs, 1 lead" required>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="!scanForm.valid">
        Initialize Neural Engine
      </button>
    </form>
  </div>
</div>
